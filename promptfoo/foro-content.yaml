# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Foro Thai content generation evals"

providers:
  - id: envoy:grok-4-1-fast-reasoning
    config:
      apiBaseUrl: "http://localhost:3001/api/xai/v1"
      apiKey: "local-proxy"
      temperature: 0.5

prompts:
  - file://prompts/foro-content.th.txt

tests:
  - description: "Social informative: no headings, no clickbait, summarize reactions collectively"
    vars:
      format: "โพสต์โซเชียล"
      tone: "ให้ข้อมูล/ปกติ"
      length: "medium"
      angle: "ข่าว + บริบทที่ควรรู้"
      custom_instructions: "ถ้าเป็นเสียงจากคนทั่วไปหรือบัญชี impact ต่ำ ให้สรุปรวม ๆ ไม่ต้องไล่เอ่ยชื่อทีละคน"
      source_material: |
        Elon Musk กล่าวว่า X อาจมีบทบาทใหญ่ขึ้นในระบบการเงินหากพัฒนาได้ตามเป้า
        หลังจากนั้นมีหลายบัญชีในโซเชียลนำไปตีความต่อว่ามันอาจเชื่อมกับ crypto และระบบชำระเงินแบบ real-time
        ยังไม่มีรายละเอียด roadmap ที่ชัดเจนจากบริษัท
    assert:
      - type: javascript
        value: |
          const format = context.vars.format || '';
          return /บทความ|SEO|บล็อก/i.test(format) || !/^\s{0,3}#{1,6}\s+/m.test(output);
      - type: javascript
        value: |
          return !/(สะเทือนโลก|ครองโลก|ครองครึ่งโลกการเงิน|โลกจะไม่เหมือนเดิมอีกต่อไป|massive|enormous)/i.test(output);
      - type: javascript
        value: |
          const handles = String(output).match(/@[A-Za-z0-9_\\.]+/g) || [];
          return handles.length <= 2;

  - description: "Social viral: still energetic, but should not become spammy"
    vars:
      format: "โพสต์โซเชียล"
      tone: "กระตือรือร้น/ไวรัล"
      length: "short"
      angle: "อธิบายให้คนทั่วไปเข้าใจเร็ว"
      custom_instructions: "เปิดแรงได้แต่ต้องยังดูน่าเชื่อถือ"
      source_material: |
        บริษัทเทคประกาศฟีเจอร์ AI ใหม่ที่สรุปเอกสารยาวให้เหลือประเด็นสำคัญในไม่กี่วินาที
        ผู้ใช้งานจำนวนหนึ่งตื่นเต้นกับความเร็ว แต่ยังมีคำถามเรื่องความแม่นยำและความเป็นส่วนตัว
    assert:
      - type: javascript
        value: |
          return !/^\s{0,3}#{1,6}\s+/m.test(output);
      - type: javascript
        value: |
          const exclamations = (String(output).match(/!/g) || []).length;
          return exclamations <= 3;
      - type: javascript
        value: |
          return !/(แชร์เลย|รีโพสต์เลย|คอมเมนต์เลย|กดแชร์ด่วน)/i.test(output);

  - description: "Blog SEO: can be structured, but should not use social CTA"
    vars:
      format: "บทความ SEO / บล็อก"
      tone: "ทางการ/วิชาการ"
      length: "long"
      angle: "วิเคราะห์โอกาสและข้อจำกัด"
      custom_instructions: "ใช้หัวข้อได้เมื่อจำเป็นจริง และแยกข้อเท็จจริงออกจากการตีความ"
      source_material: |
        หลายประเทศเริ่มทดลองโครงสร้างพื้นฐานสำหรับ cross-border payments รูปแบบใหม่
        บางฝ่ายมองว่าระบบใหม่จะลดต้นทุนและเวลาโอนเงินระหว่างประเทศ
        ขณะที่อีกฝ่ายกังวลเรื่องมาตรฐานร่วม ความเป็นส่วนตัว และการกำกับดูแล
    assert:
      - type: javascript
        value: |
          return !/(แชร์ความเห็น|รีโพสต์|กดแชร์|คอมเมนต์เลย)/i.test(output);
      - type: javascript
        value: |
          return String(output).length >= 900;
      - type: javascript
        value: |
          return /(อย่างไรก็ตาม|ขณะเดียวกัน|ข้อจำกัด|ความเสี่ยง|อีกด้านหนึ่ง)/.test(output);

  - description: "Thread: no headings, avoid over-naming low-impact reactions"
    vars:
      format: "โพสต์ให้ความรู้ (Thread)"
      tone: "เป็นกันเอง/เพื่อนเล่าให้ฟัง"
      length: "medium"
      angle: "เล่าเป็นลำดับว่าเกิดอะไรขึ้นและทำไมคนสนใจ"
      custom_instructions: "ถ้าเป็น reaction จากคนทั่วไปให้สรุปรวม ๆ ได้ แต่ถ้าเป็นคนมี impact จริงหรือโพสต์นั้น engagement สูงมากค่อยเอ่ยชื่อ"
      source_material: |
        สตาร์ตอัป AI รายหนึ่งเปิดตัวโมเดลใหม่และทำให้เกิดกระแสถกเถียงในหมู่นักพัฒนา
        ฝั่งหนึ่งชมว่าความเร็วดีขึ้นมาก ส่วนอีกฝั่งกังวลว่าคุณภาพคำตอบยังไม่นิ่ง
        มีคอมเมนต์จากหลายบัญชีทั่วไปจำนวนมาก แต่ยังไม่มีการโต้ตอบจากผู้บริหารบริษัทใหญ่ในวงการ
    assert:
      - type: javascript
        value: |
          return !/^\s{0,3}#{1,6}\s+/m.test(output);
      - type: javascript
        value: |
          const handles = String(output).match(/@[A-Za-z0-9_\\.]+/g) || [];
          return handles.length <= 2;
      - type: javascript
        value: |
          return String(output).trim().split(/\n+/).length >= 3;
